# Workflow for deploying HTML files from data/ to GitHub Pages
name: Deploy HTML from data to Pages

on:
  # Runs on pushes targeting the main branch
  push:
    branches: ["main"]

  # Schedule to run every day at 10:20 AM
  schedule:
    - cron: "20 10 * * *"

  # Allows manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload HTML files from data/
        uses: actions/upload-pages-artifact@v3
        with:
          # data/ altındaki tüm .html dosyalarını ve alt klasörlerdeki dosyaları al
          path: |
            data/**/*.html
