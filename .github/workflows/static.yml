# Workflow for deploying HTML files from data/ to GitHub Pages
name: Deploy HTML from data to Pages

on:
  push:
    branches: ["main"]

  schedule:
    - cron: "20 10 * * *"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Collect all HTML files
        run: |
          mkdir -p html_for_deploy
          # data/ altındaki tüm HTML dosyalarını ve alt klasörleri tarayarak kopyala
          find data -type f -name "*.html" -exec cp {} html_for_deploy/ \;

      - name: Upload HTML files artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'html_for_deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
